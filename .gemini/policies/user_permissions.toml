[[rule]]
toolName = "web_fetch"
decision = "allow"
priority = 100

[[rule]]
toolName = "run_shell_command"
commandPrefix = ["ls", "pwd", "cat", "echo", "printf", "grep", "find", "mkdir", "rm", "mv", "cp", "touch", "chmod", "sed", "awk", "jq", "sort", "uniq", "head", "tail", "wc", "diff", "talosctl", "talhelper", "which"]
decision = "allow"
priority = 100

[[rule]]
toolName = "activate_skill"
argsPattern = "\"name\":\\s*\"recipe-converter\""
decision = "allow"
priority = 100

[[rule]]
toolName = "replace"
decision = "allow"
priority = 100

[[rule]]
toolName = "glob"
decision = "allow"
priority = 100

[[rule]]
toolName = "write_file"
decision = "allow"
priority = 100

[[rule]]
toolName = "grep_search"
decision = "allow"
priority = 100

[[rule]]
toolName = "save_memory"
decision = "allow"
priority = 100

[[rule]]
toolName = "list_directory"
decision = "allow"
priority = 100

[[rule]]
toolName = "read_file"
decision = "allow"
priority = 100

[[rule]]
toolName = "google_web_search"
decision = "allow"
priority = 100
